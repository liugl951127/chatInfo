# =============================================================================
# cs-ai 默认 application.yml - 生产 / docker-compose 全栈模式
# 端口: 8087 (默认) / 8087 (standalone)
# 备注: 独立运行时使用 application-standalone.yml (H2 + 无 Redis)
# =============================================================================

server:
  port: 8087

spring:
  application:
    name: cs-ai
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${SPRING_DATASOURCE_URL_HOST:localhost}:${SPRING_DATASOURCE_URL_PORT:3306}/${MARIADB_DATABASE:online_chat}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:951127}
  jackson:
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

chat:
  jwt:
    secret: ${JWT_SECRET:5vQeSUDLFEt81MPAmQetxV7i8fBJLTSjPCf15seKgOI7PTXou5vgcc4M01aoseUJ}
    ttl-ms: ${JWT_TTL_MS:86400000}
  m3:
    adapter-url: ${M3_ADAPTER_URL:http://localhost:8084}
    default-model: ${M3_DEFAULT_MODEL:minimax3}

logging:
  level:
    com.chat: DEBUG
    com.chat.common.ai: DEBUG

# V3: SLA 监控 + 智能告警
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  prometheus:
    metrics:
      export:
        enabled: true
        step: 30s

# 告警配置 (cs-common AlertSender)
cs:
  alert:
    enabled: ${ALERT_ENABLED:false}
    webhook-url: ${ALERT_WEBHOOK_URL:}
    pagerduty-key: ${PAGERDUTY_KEY:}
    dingtalk-url: ${DINGTALK_WEBHOOK:}
    feishu-url: ${FEISHU_WEBHOOK:}

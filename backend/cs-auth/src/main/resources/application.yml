server:
  port: 9001

spring:
  application:
    name: cs-auth
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/online_chat?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000
  jackson:
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

chat:
  jwt:
    secret: online-chat-jwt-secret-please-change-in-production
    ttl-ms: 86400000   # 24h

logging:
  level:
    com.chat: DEBUG
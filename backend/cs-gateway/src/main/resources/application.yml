server:
  port: 9000

spring:
  application:
    name: cs-gateway
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000
  cloud:
    gateway:
      # 关闭按服务名自动路由(单机演示用不到 nacos)
      discovery:
        locator:
          enabled: false
      routes:
        # V3.2: 完整路由表 (全部微服务)
        - id: cs-auth
          uri: http://localhost:8094
          predicates:
            - Path=/auth/**
        - id: cs-im
          uri: http://localhost:9002
          predicates:
            - Path=/api/im/**
        - id: cs-cdp
          uri: http://localhost:9006
          predicates:
            - Path=/api/cdp/**
        - id: cs-community
          uri: http://localhost:9008
          predicates:
            - Path=/api/community/**
        - id: cs-prediction
          uri: http://localhost:9005
          predicates:
            - Path=/api/prediction/**
        - id: cs-customer-success
          uri: http://localhost:9007
          predicates:
            - Path=/api/success/**
        - id: cs-ai
          uri: http://localhost:8087
          predicates:
            - Path=/api/ai/**
        - id: cs-video
          uri: http://localhost:9009
          predicates:
            - Path=/api/video/**
        - id: cs-voice
          uri: http://localhost:9010
          predicates:
            - Path=/api/voice/**
        - id: cs-admin
          uri: http://localhost:8094
          predicates:
            - Path=/api/admin/**
        # WebSocket
        - id: cs-im-ws
          uri: http://localhost:9002
          predicates:
            - Path=/ws/**


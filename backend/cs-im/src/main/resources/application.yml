server:
  port: 9002

spring:
  application:
    name: cs-im
  main:
    allow-circular-references: true  # 允许 MessageService<->BotService 互依 (Spring 6 默认禁, 这里是 last resort 豁免)
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/online_chat?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 951127
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000
  jackson:
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

chat:
  jwt:
    secret: 5vQeSUDLFEt81MPAmQetxV7i8fBJLTSjPCf15seKgOI7PTXou5vgcc4M01aoseUJ
    ttl-ms: 86400000

logging:
  level:
    com.chat: DEBUG
    org.springframework.web.socket: INFO
# 录像上传大小限制 (视频分片较大, 调高)
record:
  storage-path: /tmp/chat-records

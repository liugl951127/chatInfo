server:
  port: 9009

spring:
  application:
    name: cs-video
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/online_chat?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: app
    password: app123
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000
  jackson:
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

chat:
  jwt:
    secret: 5vQeSUDLFEt81MPAmQetxV7i8fBJLTSjPCf15seKgOI7PTXou5vgcc4M01aoseUJ
    ttl-ms: 86400000
  m3:
    adapter-url: http://localhost:8084
    default-model: minimax3

logging:
  level:
    com.chat: DEBUG

# V3: SLA 监控 + 智能告警
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  prometheus:
    metrics:
      export:
        enabled: true
        step: 30s

# 告警配置 (cs-common AlertSender)
cs:
  alert:
    enabled: ${ALERT_ENABLED:false}
    webhook-url: ${ALERT_WEBHOOK_URL:}
    pagerduty-key: ${PAGERDUTY_KEY:}
    dingtalk-url: ${DINGTALK_WEBHOOK:}
    feishu-url: ${FEISHU_WEBHOOK:}

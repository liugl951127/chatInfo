# =============================================================================
# online-chat frontend nginx.conf
# -----------------------------------------------------------------------------
# 1. SPA 路由: try_files → index.html, 解决 Vue Router history mode
# 2. /api/   反代: 经 Gateway (9000) 路由到后端微服务
# 3. /ws/    反代: WebSocket (STOMP over SockJS)
# 4. /auth/  反代: 直连 cs-auth (避免 Gateway 拦截)
# 5. /h2-console/ 反代: 开发态 H2 Web UI
#
# 环境变量 (docker-compose 注入):
#   BACKEND_GATEWAY_URL  - 反代上游 (默认 http://cs-gateway:9000)
# =============================================================================

upstream chat_backend {
    # 由 docker-compose 解析, 缺省指向 cs-gateway 容器
    server ${BACKEND_GATEWAY_URL}:9000;
    keepalive 32;
}

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    # 上传体积上限 (前端 → 后端)
    client_max_body_size 100M;

    # 安全 & 性能
    gzip               on;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_comp_level    5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # 根路径: SPA 静态资源
    root   /usr/share/nginx/html;
    index  index.html;

    # ----- 1) 后端 API: /api/ -----
    location /api/ {
        proxy_pass         http://chat_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # ----- 2) WebSocket: /ws/ -----
    location /ws/ {
        proxy_pass         http://chat_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;   # 长连接
    }

    # ----- 3) 鉴权直连: /auth/ -----
    location /auth/ {
        proxy_pass         http://chat_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ----- 4) H2 Console (开发态) -----
    location /h2-console/ {
        proxy_pass         http://chat_backend;
        proxy_set_header   Host              $host;
    }

    # ----- 5) 健康探针 -----
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ----- 6) SPA 路由 fallback -----
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # 错误页
    error_page  500 502 503 504  /50x.html;
    location = /50x.html {
        root  /usr/share/nginx/html;
    }
}

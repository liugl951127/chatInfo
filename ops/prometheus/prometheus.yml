global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: chat-prod
    region: cn-hangzhou

# 加载告警规则
rule_files:
  - "alerts.yml"

# 告警路由 (AlertManager)
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# 抓取配置
scrape_configs:
  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ========== cs-* 微服务 ==========
  - job_name: 'cs-im'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['cs-im:8082']
        labels:
          service: cs-im
          tier: core

  - job_name: 'cs-cdp'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['cs-cdp:8083']
        labels:
          service: cs-cdp
          tier: support

  - job_name: 'cs-community'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['cs-community:8084']
        labels:
          service: cs-community
          tier: support

  - job_name: 'cs-prediction'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['cs-prediction:8085']
        labels:
          service: cs-prediction
          tier: support

  - job_name: 'cs-customer-success'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['cs-customer-success:8086']
        labels:
          service: cs-customer-success
          tier: support

  - job_name: 'cs-ai'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['cs-ai:8087']
        labels:
          service: cs-ai
          tier: support

  - job_name: 'cs-video'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['cs-video:8088']
        labels:
          service: cs-video
          tier: support

  - job_name: 'cs-voice'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['cs-voice:8089']
        labels:
          service: cs-voice
          tier: support

  - job_name: 'cs-auth'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['cs-auth:8081']
        labels:
          service: cs-auth
          tier: core

  # ========== 基础设施 ==========
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'mariadb'
    static_configs:
      - targets: ['mysqld-exporter:9104']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']